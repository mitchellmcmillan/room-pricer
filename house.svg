<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="UK terrace house icon">
  <title>UK terrace house icon</title>

  <!-- Chimney behind roof -->
  <rect x="18" y="12" width="6" height="8" fill="#5d3b1e"/>
  <rect x="20" y="10" width="2" height="3" fill="#7a4a28"/>

  <!-- Roof -->
  <polygon points="12,28 52,28 42,18 22,18" fill="#5d3b1e"/>

  <!-- House body -->
  <rect x="14" y="28" width="36" height="26" rx="2" fill="#8b5e3c"/>

  <!-- Windows -->
  <rect x="18" y="34" width="7" height="7" rx="1" fill="#ffffff"/>
  <rect x="36" y="34" width="7" height="7" rx="1" fill="#ffffff"/>

  <!-- Door -->
  <rect x="30" y="38" width="8" height="16" rx="1" fill="#3d2a1a"/>
  <circle cx="37" cy="46" r="1" fill="#d8b47a"/>

  <!-- Step -->
  <rect x="29" y="54" width="10" height="2" fill="#6e4a2d"/>
</svg>
